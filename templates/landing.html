<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Study Helper - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .landing-container { 
            background-color: white; 
            padding: 3rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            max-width: 600px; 
            text-align: center; 
        }
        
        h1 { color: #333; margin-top: 0; font-size: 2.5rem; }
        p { color: #555; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem;}

        .icon-container {
            font-size: 4rem;
            color: #4CAF50;
            margin-bottom: 1rem;
        }

        /* Try Now Button Styles */
        .try-now-btn {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            font-size: 1.2rem;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }

        .try-now-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="icon-container">
            <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h1>Student Study Helper</h1>
        <p>Transform your dense university video lectures into clean, comprehensive, and highly structured Markdown study guides. Our AI orchestrates audio transcription, visual analysis, and semantic reasoning to reduce your cognitive load.</p>
        
        <a href="/app" class="try-now-btn"><i class="fa-solid fa-rocket"></i> Try Now</a>
    </div>

</body>
</html>
